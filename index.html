<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SprAIs - Reporte Realtime</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Dashboard de Control SprAIs</h1>
        <p id="fecha-actualizacion"></p>
    </header>
    
    <main>
        <section class="summary-cards">
            <div class="card">
                <h3>Total Equipos</h3>
                <p id="totalEquipos">0</p>
            </div>
            <div class="card warning">
                <h3>Logs con Retraso</h3>
                <p id="equiposRetrasados">0</p>
            </div>
            <div class="card alert">
                <h3>Fallas Starlink</h3>
                <p id="equiposSinStarlink">0</p>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="graficoUploads"></canvas>
        </section>

        <section class="table-container">
            <h2>Detalle de Estado por Equipo</h2>
            <table id="tablaEquipos">
                <thead>
                    <tr>
                        <th>ID Equipo</th>
                        <th>Docs Subidos</th>
                        <th>Diferencia Logs</th>
                        <th>Estado Starlink</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
