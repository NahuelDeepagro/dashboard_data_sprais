<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reporte SprAIs</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Resumen de Estado: Equipos SprAIs</h1>
    </header>
    
    <main>
        <section class="summary-cards">
            <div class="card">
                <h3>Total Equipos</h3>
                <p id="totalEquipos">--</p>
            </div>
            <div class="card warning">
                <h3>Último Upload > 24h</h3>
                <p id="equiposRetrasados">--</p>
            </div>
            <div class="card alert">
                <h3>Sin Starlink</h3>
                <p id="equiposSinStarlink">--</p>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="graficoUploads"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
