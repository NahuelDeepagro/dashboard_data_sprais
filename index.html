<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sincronización SPRAI</title>
    <!-- Tailwind CSS para diseño rápido y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .success { background-color: #def7ec; color: #03543f; }
        .warning { background-color: #fdf6b2; color: #723b13; }
        .danger { background-color: #fde8e8; color: #9b1c1c; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Encabezado -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Estado de Sincronización</h1>
                <p id="fecha-actualizacion" class="text-sm text-gray-500">Cargando datos...</p>
            </div>
            <div class="flex space-x-4">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                    <p class="text-xs text-gray-500 uppercase font-bold">Total Equipos AA/DD</p>
                    <p id="total-equipos" class="text-xl font-bold text-blue-600">0</p>
                </div>
            </div>
        </div>

        <!-- Sección de Gráficos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="h-64">
                    <canvas id="graficoLogs"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="h-64">
                    <canvas id="graficoImg"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabla de Datos -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-100">
                <h2 class="font-bold text-gray-700">Detalle de Equipos (Filtro AA/DD)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="p-4 font-semibold text-sm text-gray-600">ID Equipo</th>
                            <th class="p-4 font-semibold text-sm text-gray-600">Dif. Logs</th>
                            <th class="p-4 font-semibold text-sm text-gray-600">Rango Logs</th>
                            <th class="p-4 font-semibold text-sm text-gray-600">Dif. Img</th>
                            <th class="p-4 font-semibold text-sm text-gray-600">Rango Img</th>
                        </tr>
                    </thead>
                    <tbody id="listaEquipos" class="divide-y divide-gray-100">
                        <!-- Los datos se insertan aquí vía JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
